services:
  trap-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    environment:
      LLMTRAP_DASHBOARD_URL: ${LLMTRAP_DASHBOARD_URL:-https://dashboard.example.com}
      LLMTRAP_NODE_KEY: ${LLMTRAP_NODE_KEY:-replace-me}
      NODE_HTTP_PORT: ${NODE_HTTP_PORT:-11434}
      OPENAI_HTTP_PORT: ${OPENAI_HTTP_PORT:-8080}
      ANTHROPIC_HTTP_PORT: ${ANTHROPIC_HTTP_PORT:-8081}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:${NODE_HTTP_PORT:-11434}/internal/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - honeypot
      - internal
    ports:
      - '0.0.0.0:${NODE_HTTP_PORT:-11434}:${NODE_HTTP_PORT:-11434}'
      - '0.0.0.0:${OPENAI_HTTP_PORT:-8080}:${OPENAI_HTTP_PORT:-8080}'
      - '0.0.0.0:${ANTHROPIC_HTTP_PORT:-8081}:${ANTHROPIC_HTTP_PORT:-8081}'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

networks:
  honeypot:
    driver: bridge
  internal:
    driver: bridge