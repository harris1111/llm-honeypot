name: llmtrap-node

services:
  trap-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    environment:
      LLMTRAP_DASHBOARD_URL: ${LLMTRAP_DASHBOARD_URL:?Set LLMTRAP_DASHBOARD_URL to the dashboard origin, e.g. https://dashboard.example.com}
      LLMTRAP_NODE_KEY: ${LLMTRAP_NODE_KEY:?Set LLMTRAP_NODE_KEY to the key issued by the dashboard}
      NODE_HTTP_PORT: ${NODE_HTTP_PORT:-11434}
      OPENAI_HTTP_PORT: ${OPENAI_HTTP_PORT:-8080}
      ANTHROPIC_HTTP_PORT: ${ANTHROPIC_HTTP_PORT:-8081}
      TEXT_GENERATION_WEBUI_HTTP_PORT: ${TEXT_GENERATION_WEBUI_HTTP_PORT:-5000}
      LANGSERVE_HTTP_PORT: ${LANGSERVE_HTTP_PORT:-8000}
      AUTOGPT_HTTP_PORT: ${AUTOGPT_HTTP_PORT:-8084}
      LM_STUDIO_HTTP_PORT: ${LM_STUDIO_HTTP_PORT:-1234}
      LLAMACPP_HTTP_PORT: ${LLAMACPP_HTTP_PORT:-8082}
      VLLM_HTTP_PORT: ${VLLM_HTTP_PORT:-8083}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:${NODE_HTTP_PORT:-11434}/internal/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - honeypot
      - internal
    ports:
      - '0.0.0.0:${NODE_HTTP_PORT:-11434}:${NODE_HTTP_PORT:-11434}'
      - '0.0.0.0:${OPENAI_HTTP_PORT:-8080}:${OPENAI_HTTP_PORT:-8080}'
      - '0.0.0.0:${ANTHROPIC_HTTP_PORT:-8081}:${ANTHROPIC_HTTP_PORT:-8081}'
      - '0.0.0.0:${TEXT_GENERATION_WEBUI_HTTP_PORT:-5000}:${TEXT_GENERATION_WEBUI_HTTP_PORT:-5000}'
      - '0.0.0.0:${LANGSERVE_HTTP_PORT:-8000}:${LANGSERVE_HTTP_PORT:-8000}'
      - '0.0.0.0:${AUTOGPT_HTTP_PORT:-8084}:${AUTOGPT_HTTP_PORT:-8084}'
      - '0.0.0.0:${LM_STUDIO_HTTP_PORT:-1234}:${LM_STUDIO_HTTP_PORT:-1234}'
      - '0.0.0.0:${LLAMACPP_HTTP_PORT:-8082}:${LLAMACPP_HTTP_PORT:-8082}'
      - '0.0.0.0:${VLLM_HTTP_PORT:-8083}:${VLLM_HTTP_PORT:-8083}'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

networks:
  honeypot:
    driver: bridge
  internal:
    driver: bridge
