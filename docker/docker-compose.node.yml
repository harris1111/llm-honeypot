name: llmtrap-node

services:
  trap-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    # Host networking lets the honeypot see real attacker IPs on
    # socket.remoteAddress. Bridge networking NATs everything to the
    # Docker gateway (e.g. 172.x.0.1), hiding the real source.
    network_mode: host
    environment:
      LLMTRAP_DASHBOARD_URL: ${LLMTRAP_DASHBOARD_URL:?Set LLMTRAP_DASHBOARD_URL to the dashboard origin, e.g. https://dashboard.example.com}
      LLMTRAP_NODE_KEY: ${LLMTRAP_NODE_KEY:?Set LLMTRAP_NODE_KEY to the key issued by the dashboard}
      NODE_HTTP_PORT: ${NODE_HTTP_PORT:-11434}
      OPENAI_HTTP_PORT: ${OPENAI_HTTP_PORT:-8080}
      ANTHROPIC_HTTP_PORT: ${ANTHROPIC_HTTP_PORT:-8081}
      TEXT_GENERATION_WEBUI_HTTP_PORT: ${TEXT_GENERATION_WEBUI_HTTP_PORT:-5000}
      LANGSERVE_HTTP_PORT: ${LANGSERVE_HTTP_PORT:-8000}
      AUTOGPT_HTTP_PORT: ${AUTOGPT_HTTP_PORT:-8084}
      LM_STUDIO_HTTP_PORT: ${LM_STUDIO_HTTP_PORT:-1234}
      LLAMACPP_HTTP_PORT: ${LLAMACPP_HTTP_PORT:-8082}
      VLLM_HTTP_PORT: ${VLLM_HTTP_PORT:-8083}
      QDRANT_HTTP_PORT: ${QDRANT_HTTP_PORT:-6333}
      CHROMADB_HTTP_PORT: ${CHROMADB_HTTP_PORT:-8085}
      NEO4J_HTTP_PORT: ${NEO4J_HTTP_PORT:-7474}
      WEAVIATE_HTTP_PORT: ${WEAVIATE_HTTP_PORT:-8086}
      MILVUS_HTTP_PORT: ${MILVUS_HTTP_PORT:-19530}
      PLEX_HTTP_PORT: ${PLEX_HTTP_PORT:-32400}
      SONARR_HTTP_PORT: ${SONARR_HTTP_PORT:-8989}
      RADARR_HTTP_PORT: ${RADARR_HTTP_PORT:-7878}
      PROWLARR_HTTP_PORT: ${PROWLARR_HTTP_PORT:-9696}
      PORTAINER_HTTP_PORT: ${PORTAINER_HTTP_PORT:-9000}
      HOME_ASSISTANT_HTTP_PORT: ${HOME_ASSISTANT_HTTP_PORT:-8123}
      GITEA_HTTP_PORT: ${GITEA_HTTP_PORT:-3001}
      GRAFANA_HTTP_PORT: ${GRAFANA_HTTP_PORT:-3002}
      PROMETHEUS_HTTP_PORT: ${PROMETHEUS_HTTP_PORT:-9090}
      UPTIME_KUMA_HTTP_PORT: ${UPTIME_KUMA_HTTP_PORT:-3003}
      SSH_PORT: ${SSH_PORT:-10022}
      FTP_PORT: ${FTP_PORT:-10021}
      SMTP_PORT: ${SMTP_PORT:-10025}
      SMTP_SUBMISSION_PORT: ${SMTP_SUBMISSION_PORT:-10587}
      DNS_PORT: ${DNS_PORT:-1053}
      SMB_PORT: ${SMB_PORT:-10445}
      TELNET_PORT: ${TELNET_PORT:-10023}
      LLMTRAP_RUNTIME_DIR: /home/llmtrap/.llmtrap-runtime
      REDIS_URL: redis://127.0.0.1:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:${NODE_HTTP_PORT:-11434}/internal/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - node-runtime:/home/llmtrap/.llmtrap-runtime
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    ports:
      - '127.0.0.1:6379:6379'
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  node-runtime:
