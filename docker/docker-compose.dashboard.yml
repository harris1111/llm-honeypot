name: llmtrap-dashboard

x-api-build: &api-build
  context: ..
  dockerfile: docker/Dockerfile.api

x-app-env: &app-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-llmtrap}:${POSTGRES_PASSWORD:-llmtrap}@postgres:5432/${POSTGRES_DB:-llmtrap}
  POSTGRES_DB: ${POSTGRES_DB:-llmtrap}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmtrap}
  POSTGRES_USER: ${POSTGRES_USER:-llmtrap}
  REDIS_URL: redis://redis:6379

services:
  db-init:
    build: *api-build
    command: ['/usr/local/bin/db-init.sh']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    networks:
      - backend
    restart: 'no'

  api:
    build: *api-build
    environment:
      API_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a random 32+ character secret}
      <<: *app-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/api/v1/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    ports:
      - '127.0.0.1:4000:4000'
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/healthz >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frontend
      - backend
    ports:
      - '0.0.0.0:3000:8080'
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      WORKER_CONCURRENCY: 4
      WORKER_PORT: 4100
      <<: *app-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4100/internal/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmtrap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmtrap}
      POSTGRES_USER: ${POSTGRES_USER:-llmtrap}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-llmtrap} -d ${POSTGRES_DB:-llmtrap}']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  pgdata: