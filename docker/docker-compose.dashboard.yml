name: llmtrap-dashboard

x-api-build: &api-build
  context: ..
  dockerfile: docker/Dockerfile.api

x-app-env: &app-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-llmtrap}:${POSTGRES_PASSWORD:-llmtrap}@postgres:5432/${POSTGRES_DB:-llmtrap}
  POSTGRES_DB: ${POSTGRES_DB:-llmtrap}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmtrap}
  POSTGRES_USER: ${POSTGRES_USER:-llmtrap}
  REDIS_URL: redis://redis:6379
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
  S3_BUCKET: ${S3_BUCKET:-}
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
  S3_REGION: ${S3_REGION:-}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}

services:
  db-init:
    build: *api-build
    command: ['/usr/local/bin/db-init.sh']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    networks:
      - backend
    restart: 'no'

  api:
    build: *api-build
    environment:
      API_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a random 32+ character secret}
      <<: *app-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/api/v1/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    ports:
      - '127.0.0.1:4000:4000'
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/healthz >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frontend
      - backend
    ports:
      - '127.0.0.1:3000:8080'
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      ARCHIVE_PREFIX: ${ARCHIVE_PREFIX:-archives}
      ARCHIVE_RETENTION_DAYS: ${ARCHIVE_RETENTION_DAYS:-30}
      WORKER_ALERT_INTERVAL_MS: ${WORKER_ALERT_INTERVAL_MS:-15000}
      WORKER_ALERT_WEBHOOK_TIMEOUT_MS: ${WORKER_ALERT_WEBHOOK_TIMEOUT_MS:-5000}
      WORKER_ALERT_WEBHOOK_URL: ${WORKER_ALERT_WEBHOOK_URL:-}
      WORKER_ARCHIVE_INTERVAL_MS: ${WORKER_ARCHIVE_INTERVAL_MS:-21600000}
      WORKER_CONCURRENCY: 4
      WORKER_PORT: 4100
      <<: *app-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4100/internal/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmtrap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmtrap}
      POSTGRES_USER: ${POSTGRES_USER:-llmtrap}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-llmtrap} -d ${POSTGRES_DB:-llmtrap}']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin123}
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
    ports:
      - '127.0.0.1:9001:9000'
      - '127.0.0.1:9002:9001'
    restart: unless-stopped
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    entrypoint: ['/bin/sh', '-c']
    command:
      [
        'mc alias set local http://minio:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY" && mc mb --ignore-existing "local/$$S3_BUCKET"',
      ]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *app-env
    networks:
      - backend
    restart: 'no'

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  pgdata:
  minio-data: